name: C++ Build
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install OpenCV
        run: choco install opencv
      - name: Find OpenCV path
        run: dir C:\tools\opencv /s /b | findstr "OpenCVConfig.cmake"
      - name: Configure with CMake
        run: cmake -B build -DOpenCV_DIR="C:\tools\opencv\build"
      - name: Build
        run: cmake --build build
